# Build gate — must pass before merging to main (and before Vercel production deploy).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && NODE_OPTIONS=--disable-warning=DEP0040 npm ci

      - name: Unit tests
        env:
          SESSION_SECRET: ci-test-session-secret-connect-intel
          NODE_ENV: development
        run: npm test

      - name: Platform verify (Infrastructure V2)
        env:
          SESSION_SECRET: ci-test-session-secret-connect-intel
          NODE_ENV: development
        run: npm run platform:verify

      - name: RBAC handler audit
        run: npm run rbac:audit -- --strict

      - name: Verify deploy-critical files
        run: node scripts/verify-deploy.mjs --skip-build

      - name: Build frontend
        run: cd frontend && NODE_OPTIONS=--disable-warning=DEP0040 npm run build

      - name: Verify server modules load
        run: node scripts/verify-deploy.mjs --server-only
